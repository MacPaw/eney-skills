name: Setup CLI
description: Configure Node.js and install CLI dependencies

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: cli/package-lock.json

    - name: Install CLI dependencies
      shell: bash
      run: npm ci --prefix cli

    - name: Link CLI globally
      shell: bash
      run: |
        cd cli
        npm link
