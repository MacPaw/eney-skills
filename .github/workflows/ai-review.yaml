name: AI PR Review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      provider:
        description: "AI provider"
        required: false
        type: choice
        default: "claude"
        options:
          - claude
      model:
        description: "Model to use"
        required: false
        type: choice
        default: "claude-sonnet-4-6"
        options:
          - claude-opus-4-6
          - claude-sonnet-4-6
          - claude-haiku-4-5

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.label.name == '✨ AI Review ✨' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: MacPaw/.github-private/.github/actions/pr-review@main
        with:
          anthropic_api_key: ${{ secrets.ORG_ANTHROPIC_API_KEY_PR_REVIEWS }}
          provider: ${{ github.event.inputs.provider || 'claude' }}
          model: ${{ github.event.inputs.model }}
          workflow_trigger_label: "✨ AI Review ✨"
          pr_review_instructions_file: ".github/ai-rules/pr-review.md"
