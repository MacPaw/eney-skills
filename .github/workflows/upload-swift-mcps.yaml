name: "Publish Swift MCP"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-mcps-changes.yaml
    permissions:
      pull-requests: read
      contents: read

  publish-swift-mcp:
    name: Publish Swift MCP
    runs-on: macos-26
    needs: detect-changes
    env:
      API_TOKEN: ${{ secrets.API_TOKEN }}
    permissions:
      contents: read
      id-token: write
    # && github.event_name != 'pull_request'
    if: needs.detect-changes.outputs.has_swift_changes == 'true'
      && !contains(github.event.pull_request.title, '[skip ci]')
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJson(needs.detect-changes.outputs.swift_mcps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2
        with:
          token_format: access_token
          workload_identity_provider: projects/77571513357/locations/global/workloadIdentityPools/github-action-pool/providers/github-action-pool-provider
          service_account: gh-action-eney@macpaw-devops.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - name: Build Swift binary
        run: swift build -c release
        working-directory: extensions/${{ matrix.mcp }}

      - name: Prepare binary for packaging
        run: |
          ENTRY_POINT=$(jq -r '.server.entry_point' manifest.json)
          BINARY_NAME=$(swift package dump-package | jq -r '.targets[0].name')
          mkdir -p "$(dirname $ENTRY_POINT)"
          cp ".build/release/$BINARY_NAME" "$ENTRY_POINT"
        working-directory: extensions/${{ matrix.mcp }}

      - name: Setup CLI
        uses: ./.github/actions/setup-cli

      - name: Pack MCP archive
        id: pack
        run: |
          MCP_NAME=$(jq -r '.name' manifest.json)
          MCP_VERSION=$(jq -r '.version' manifest.json)
          ARCHIVE_NAME="${MCP_NAME}@v${MCP_VERSION}.mcpb"
          npx --yes @anthropic-ai/mcpb pack . "$ARCHIVE_NAME"
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
        working-directory: extensions/${{ matrix.mcp }}

      - name: Upload MCP archive
        run: |
          eney-skills-cli upload-mcp-archive \
            --archive-path extensions/${{ matrix.mcp }}/${{ steps.pack.outputs.archive_name }} \
            --mode production

      - name: Publish MCP metadata
        run: |
          eney-skills-cli publish-mcp-metadata \
            --mode production \
            --archive-path extensions/${{ matrix.mcp }}/${{ steps.pack.outputs.archive_name }}
