name: "Publish Node.js MCP"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-mcps-changes.yaml
    permissions:
      pull-requests: read
      contents: read

  publish-node-mcp:
    name: Publish Node MCP
    runs-on: ubuntu-24.04-arm
    needs: detect-changes
    env:
      API_TOKEN: ${{ secrets.API_TOKEN }}
    permissions:
      contents: read
    # && github.event_name != 'pull_request'
    if: needs.detect-changes.outputs.has_node_changes == 'true'
      && !contains(github.event.pull_request.title, '[skip ci]')
    strategy:
      fail-fast: false
      matrix:
        mcp: ${{ fromJson(needs.detect-changes.outputs.node_mcps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup CLI
        uses: ./.github/actions/setup-cli

      - name: Pack MCP archive
        id: pack
        run: |
          MCP_NAME=$(jq -r '.name' manifest.json)
          MCP_VERSION=$(jq -r '.version' manifest.json)
          ARCHIVE_NAME="${MCP_NAME}@v${MCP_VERSION}.mcpb"
          npm ci --os=darwin --cpu=arm64
          npm run build
          npx --yes @anthropic-ai/mcpb pack dist "$ARCHIVE_NAME"
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
        working-directory: extensions/${{ matrix.mcp }}

      - name: Upload MCP archive
        run: |
          eney-skills-cli upload-mcp-archive \
            --archive-path extensions/${{ matrix.mcp }}/${{ steps.pack.outputs.archive_name }} \
            --mode production

      - name: Publish MCP metadata
        run: |
          eney-skills-cli publish-mcp-metadata \
            --mode production \
            --archive-path extensions/${{ matrix.mcp }}/${{ steps.pack.outputs.archive_name }}
