name: "Detect MCP Changes"

on:
  workflow_call:
    outputs:
      mcps:
        description: "List of MCPs that changed"
        value: ${{ jobs.detect.outputs.mcps }}
      has_changes:
        description: "Whether any MCPs changed"
        value: ${{ jobs.detect.outputs.has_changes }}
      node_mcps:
        description: "List of Node.js MCPs that changed"
        value: ${{ jobs.detect.outputs.node_mcps }}
      has_node_changes:
        description: "Whether any Node.js MCPs changed"
        value: ${{ jobs.detect.outputs.has_node_changes }}
      swift_mcps:
        description: "List of Swift MCPs that changed"
        value: ${{ jobs.detect.outputs.swift_mcps }}
      has_swift_changes:
        description: "Whether any Swift MCPs changed"
        value: ${{ jobs.detect.outputs.has_swift_changes }}

jobs:
  detect:
    name: Detect changes in MCPs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      mcps: ${{ steps.get-changes.outputs.mcps }}
      has_changes: ${{ steps.get-changes.outputs.has_changes }}
      node_mcps: ${{ steps.get-changes.outputs.node_mcps }}
      has_node_changes: ${{ steps.get-changes.outputs.has_node_changes }}
      swift_mcps: ${{ steps.get-changes.outputs.swift_mcps }}
      has_swift_changes: ${{ steps.get-changes.outputs.has_swift_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2

      - name: Check for MCP changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          list-files: json
          filters: |
            mcps:
              - 'mcps/**'

      - name: Get changed MCPs
        id: get-changes
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const filePaths = JSON.parse('${{ steps.filter.outputs.mcps_files }}');
            const mcps = filePaths
              .filter(path => path.startsWith('mcps/'))
              .map(path => {
                const segments = path.split('/');
                if (segments.length < 2) {
                  return null;
                }

                return segments[1];
              })
              .filter((mcp, index, self) => self.indexOf(mcp) === index)
              .filter((mcp) => mcp !== null);

            function hasVersionChanged(mcp) {
              try {
                const curr = JSON.parse(fs.readFileSync(`mcps/${mcp}/manifest.json`, 'utf8')).version;
                const prev = JSON.parse(execSync(
                  `git show HEAD~1:mcps/${mcp}/manifest.json 2>/dev/null || echo '{}'`,
                  { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }
                )).version || '';
                const changed = curr !== prev;
                console.log(`${mcp}: ${prev} -> ${curr} (${changed ? 'changed' : 'unchanged'})`);
                return changed;
              } catch (e) {
                console.log(`${mcp}: error checking version (${e.message}), including`);
                return true;
              }
            }

            const versionedMcps = mcps.filter(hasVersionChanged);

            const swiftMcps = versionedMcps.filter(mcp => fs.existsSync(`mcps/${mcp}/Package.swift`));
            const nodeMcps = versionedMcps.filter(mcp => !fs.existsSync(`mcps/${mcp}/Package.swift`));

            console.log('All changed MCPs:', JSON.stringify(mcps, null, 2));
            core.setOutput('mcps', mcps);
            core.setOutput('has_changes', mcps.length > 0);
            core.setOutput('node_mcps', nodeMcps);
            core.setOutput('has_node_changes', nodeMcps.length > 0);
            core.setOutput('swift_mcps', swiftMcps);
            core.setOutput('has_swift_changes', swiftMcps.length > 0);
