name: "Detect MCP Changes"

on:
  workflow_call:
    outputs:
      mcps:
        description: "List of MCPs that changed"
        value: ${{ jobs.detect.outputs.mcps }}
      has_changes:
        description: "Whether any MCPs changed"
        value: ${{ jobs.detect.outputs.has_changes }}

jobs:
  detect:
    name: Detect changes in MCPs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      mcps: ${{ steps.get-changes.outputs.mcps }}
      has_changes: ${{ steps.get-changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Check for MCP changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          list-files: json
          filters: |
            mcps:
              - 'mcps/**'

      - name: Get changed MCPs
        id: get-changes
        uses: actions/github-script@v8
        with:
          script: |
            const filePaths = JSON.parse('${{ steps.filter.outputs.mcps_files }}');
            const mcps = filePaths
              .filter(path => path.startsWith('mcps/'))
              .map(path => {
                const segments = path.split('/');
                if (segments.length < 2) {
                  return null;
                }

                return segments[1];
              })
              .filter((mcp, index, self) => self.indexOf(mcp) === index)
              .filter((mcp) => mcp !== null);

            console.log(JSON.stringify(mcps, null, 2));
            core.setOutput('mcps', mcps);
            core.setOutput('has_changes', mcps.length > 0);
