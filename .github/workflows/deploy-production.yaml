name: "Deploy to Production"

on:
  push:
    tags:
      - "*"

jobs:
  parse-tag:
    name: Parse tag and validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      extension: ${{ steps.parse.outputs.extension }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXTENSION="${TAG%@*}"
          VERSION="${TAG#*@}"
          echo "extension=$EXTENSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying $EXTENSION version $VERSION to production"

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.ref }}

      - name: Validate extension exists
        run: |
          if [ ! -d "extensions/${{ steps.parse.outputs.extension }}" ]; then
            echo "Error: Extension '${{ steps.parse.outputs.extension }}' not found"
            exit 1
          fi

  upload-archive:
    name: Upload extension archive to GCS
    runs-on: ubuntu-latest
    needs: parse-tag
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.ref }}

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2
        with:
          token_format: access_token
          workload_identity_provider: projects/77571513357/locations/global/workloadIdentityPools/github-action-pool/providers/github-action-pool-provider
          service_account: gh-action-eney@macpaw-devops.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - name: Setup CLI
        uses: ./.github/actions/setup-cli
        with:
          npm_token: ${{ secrets.ORG_GHA_TOKEN_NPMJS_PACKAGES_RO }}

      - name: Upload extension archive
        id: upload
        run: |
          node cli/main.ts upload-archive \
            --cwd extensions/${{ needs.parse-tag.outputs.extension }} \
            --mode production

      - name: Save metadata for publish job
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('metadata', { recursive: true });
            fs.copyFileSync('extensions/${{ needs.parse-tag.outputs.extension }}/manifest.json', 'metadata/manifest.json');
            fs.writeFileSync('metadata/outputs.json', JSON.stringify({
              extension_name: '${{ steps.upload.outputs.extension_name }}',
              version: '${{ steps.upload.outputs.version }}',
              hash: '${{ steps.upload.outputs.hash }}',
              download_url: '${{ steps.upload.outputs.download_url }}'
            }, null, 2));

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-metadata
          path: metadata/
          retention-days: 1

  publish-backend:
    name: Publish extension to backend
    runs-on:
      group: gcp-k8s
    needs: [parse-tag, upload-archive]
    permissions:
      contents: read
    env:
      BACKEND_URL: https://core.internal.eney.ai
      ADMIN_AUTH_TOKEN_PRODUCTION: ${{ secrets.ADMIN_AUTH_TOKEN_PRODUCTION }}
      ADMIN_AUTH_TOKEN_STAGING: ${{ secrets.ADMIN_AUTH_TOKEN_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.ref }}

      - name: Download metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-metadata
          path: metadata/

      - name: Setup CLI
        uses: ./.github/actions/setup-cli
        with:
          npm_token: ${{ secrets.ORG_GHA_TOKEN_NPMJS_PACKAGES_RO }}

      - name: Read metadata
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metadata = JSON.parse(fs.readFileSync('metadata/outputs.json', 'utf8'));
            core.setOutput('version', metadata.version || '');
            core.setOutput('hash', metadata.hash || '');
            core.setOutput('download_url', metadata.download_url || '');

      - name: Publish extension to backend
        run: |
          ARGS=(--cwd "extensions/${{ needs.parse-tag.outputs.extension }}" --mode production)

          if [ -n "${{ steps.metadata.outputs.version }}" ]; then
            ARGS+=(--extension-version "${{ steps.metadata.outputs.version }}")
          fi

          if [ -n "${{ steps.metadata.outputs.hash }}" ]; then
            ARGS+=(--hash "${{ steps.metadata.outputs.hash }}")
          fi

          if [ -n "${{ steps.metadata.outputs.download_url }}" ]; then
            ARGS+=(--download-url "${{ steps.metadata.outputs.download_url }}")
          fi

          node cli/main.ts publish "${ARGS[@]}"
