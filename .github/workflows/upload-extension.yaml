name: "Upload Extension archive"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-extension-changes.yaml
    permissions:
      pull-requests: read
      contents: read

  uploadExtensionArchive:
    name: Upload extension archive
    runs-on:
      group: gcp-k8s
    needs: detect-changes
    permissions:
      contents: read
      id-token: write
    if: needs.detect-changes.outputs.has_changes == 'true'
    env:
      IS_DRY_RUN: ${{ github.event_name == 'pull_request' }}
      # BACKEND_URL: https://core.eney.appflix.io
      BACKEND_URL: https://core-pr-56.eney.appflix.io
      ADMIN_AUTH_TOKEN: ${{ secrets.ADMIN_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2
        if: env.IS_DRY_RUN != 'true'
        with:
          token_format: access_token
          workload_identity_provider: projects/77571513357/locations/global/workloadIdentityPools/github-action-pool/providers/github-action-pool-provider
          service_account: gh-action-eney@macpaw-devops.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - name: Setup CLI
        uses: ./.github/actions/setup-cli
        with:
          npm_token: ${{ secrets.ORG_GHA_TOKEN_NPMJS_PACKAGES_RO }}

      - name: Check extension version
        run: node cli/main.ts check-version --cwd extensions/${{ matrix.extension }}

      - name: Get extension version
        id: get-extension-version
        run: |
          VERSION=$(cat extensions/${{ matrix.extension }}/manifest.json | jq -r '.version')
          echo "EXTENSION_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Bundle extension
        run: node cli/main.ts bundle --cwd extensions/${{ matrix.extension }} -o dist

      - name: Get archive name
        id: get-archive-name
        run: |
          ARCHIVE_NAME=${{ matrix.extension }}@v${{ steps.get-extension-version.outputs.EXTENSION_VERSION }}.zip
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_OUTPUT

      - name: Create extension archive
        run: |
          cd dist
          tar -czf ${{ steps.get-archive-name.outputs.ARCHIVE_NAME }} ${{ matrix.extension }}

      - id: get-archive-sha
        name: Get archive hash
        run: |
          ARCHIVE_SHA256=$(shasum -a 256 dist/${{ steps.get-archive-name.outputs.ARCHIVE_NAME }} | awk '{print $1}')
          echo "ARCHIVE_SHA256=$ARCHIVE_SHA256" >> $GITHUB_OUTPUT

      - id: upload-extension-archive
        name: Upload Extension Archive
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3
        if: env.IS_DRY_RUN != 'true'
        with:
          path: dist/${{ steps.get-archive-name.outputs.ARCHIVE_NAME }}
          destination: "eney-assets/extensions"
          predefinedAcl: "publicRead"
          process_gcloudignore: false

      - id: get-download-url
        name: Get download URL
        run: |
          DOWNLOAD_URL="https://storage.googleapis.com/eney-assets/extensions/${{ steps.get-archive-name.outputs.ARCHIVE_NAME }}"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Publish extension
        run: |
          DRY_RUN_ARG=""

          if [ "${{ env.IS_DRY_RUN }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          node cli/main.ts publish \
            --cwd extensions/${{ matrix.extension }} \
            --extension-version ${{ steps.get-extension-version.outputs.EXTENSION_VERSION }} \
            --hash ${{ steps.get-archive-sha.outputs.ARCHIVE_SHA256 }} \
            --download-url ${{ steps.get-download-url.outputs.DOWNLOAD_URL }} \
            $DRY_RUN_ARG
