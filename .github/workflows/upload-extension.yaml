name: "Upload Extension archive"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-extension-changes.yaml
    permissions:
      pull-requests: read
      contents: read

  pack-and-upload-archive:
    name: Pack and upload extension archive
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read
      id-token: write
    if: needs.detect-changes.outputs.has_changes == 'true' && !contains(github.event.pull_request.title, '[skip ci]')
    env:
      IS_DRY_RUN: ${{ github.event_name == 'pull_request' }}
      BACKEND_URL: https://core.eney.appflix.io
      ADMIN_AUTH_TOKEN_PRODUCTION: ${{ secrets.ADMIN_AUTH_TOKEN_PRODUCTION }}
      ADMIN_AUTH_TOKEN_STAGING: ${{ secrets.ADMIN_AUTH_TOKEN_STAGING }}
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2
        if: env.IS_DRY_RUN != 'true'
        with:
          token_format: access_token
          workload_identity_provider: projects/77571513357/locations/global/workloadIdentityPools/github-action-pool/providers/github-action-pool-provider
          service_account: gh-action-eney@macpaw-devops.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - name: Setup CLI
        uses: ./.github/actions/setup-cli
        with:
          npm_token: ${{ secrets.ORG_GHA_TOKEN_NPMJS_PACKAGES_RO }}

      - name: Bump extension version
        run: node scripts/bump-version-for-changed.js --extension ${{ matrix.extension }}

      - name: Upload extension archive
        id: upload
        run: |
          node cli/main.ts upload-archive \
            --cwd extensions/${{ matrix.extension }} \
            --mode staging \
            --dry-run ${{ env.IS_DRY_RUN }}

      - name: Save metadata for publish job
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('metadata', { recursive: true });
            fs.copyFileSync('extensions/${{ matrix.extension }}/manifest.json', 'metadata/manifest.json');
            fs.writeFileSync('metadata/outputs.json', JSON.stringify({
              extension_name: '${{ steps.upload.outputs.extension_name }}',
              version: '${{ steps.upload.outputs.version }}',
              hash: '${{ steps.upload.outputs.hash }}',
              download_url: '${{ steps.upload.outputs.download_url }}'
            }, null, 2));

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-metadata-${{ matrix.extension }}
          path: metadata/
          retention-days: 1

  publish-to-backend:
    name: Publish extension to backend
    runs-on:
      group: gcp-k8s
    needs: [detect-changes, pack-and-upload-archive]
    permissions:
      contents: read
    if: needs.detect-changes.outputs.has_changes == 'true' && !contains(github.event.pull_request.title, '[skip ci]') && github.event_name == 'push'
    env:
      BACKEND_URL: https://core.eney.appflix.io
      ADMIN_AUTH_TOKEN_STAGING: ${{ secrets.ADMIN_AUTH_TOKEN_STAGING }}
      ADMIN_AUTH_TOKEN_PRODUCTION: ${{ secrets.ADMIN_AUTH_TOKEN_PRODUCTION }}
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Bump extension version
        run: node scripts/bump-version-for-changed.js --extension ${{ matrix.extension }}

      - name: Download metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-metadata-${{ matrix.extension }}
          path: metadata/

      - name: Setup CLI
        uses: ./.github/actions/setup-cli
        with:
          npm_token: ${{ secrets.ORG_GHA_TOKEN_NPMJS_PACKAGES_RO }}

      - name: Read metadata
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metadata = JSON.parse(fs.readFileSync('metadata/outputs.json', 'utf8'));
            core.setOutput('version', metadata.version || '');
            core.setOutput('hash', metadata.hash || '');
            core.setOutput('download_url', metadata.download_url || '');

      - name: Publish extension to backend
        run: |
          ARGS=(--cwd "extensions/${{ matrix.extension }}" --mode staging)

          if [ -n "${{ steps.metadata.outputs.version }}" ]; then
            ARGS+=(--extension-version "${{ steps.metadata.outputs.version }}")
          fi

          if [ -n "${{ steps.metadata.outputs.hash }}" ]; then
            ARGS+=(--hash "${{ steps.metadata.outputs.hash }}")
          fi

          if [ -n "${{ steps.metadata.outputs.download_url }}" ]; then
            ARGS+=(--download-url "${{ steps.metadata.outputs.download_url }}")
          fi

          node cli/main.ts publish "${ARGS[@]}"

  commit-version-bumps:
    name: Commit version bumps
    runs-on: ubuntu-latest
    needs: [detect-changes, pack-and-upload-archive, publish-to-backend]
    if: github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Bump versions for changed extensions
        run: node scripts/bump-version-for-changed.js --base ${{ github.event.before }}

      - name: Create PR with version bumps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/.gpg
          echo ${{ secrets.CI_GITHUB_GPG_KEY_BASE64 }} | base64 -d > ${GITHUB_WORKSPACE}/.gpg/private.key
          gpg --import ${GITHUB_WORKSPACE}/.gpg/private.key

          git config --global user.signingkey ${{ secrets.CI_GITHUB_GPG_KEY_SIGNING }}
          git config --global commit.gpgsign true
          git config user.name ci-macpaw
          git config user.email admin+ci-gh@macpaw.com

          # Check if there are changes to commit
          git add extensions/*/manifest.json
          if git diff --staged --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          # Create branch and commit
          BRANCH="chore/bump-versions-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: bump extension versions" -S
          git push origin "$BRANCH"

          # Create PR with [skip ci] in title
          gh pr create \
            --title "[skip ci] chore: bump extension versions" \
            --body "Auto-generated version bump after staging deploy." \
            --base main \
            --head "$BRANCH"
